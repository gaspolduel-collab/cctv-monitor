<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera CCTV (Laptop)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 12px; }
        video { background: black; border-radius: 8px; width: 100%; max-width: 500px; margin-top: 15px; border: 3px solid #444; }
        .status { padding: 12px; background: #3a3a3a; border-radius: 6px; font-weight: bold; margin-bottom: 10px; }
        .alarm-active { background: #d9534f !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #btnStart { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📷 Sistem Kamera CCTV</h2>
    <p>Browser memblokir kamera otomatis. Klik tombol di bawah untuk menyalakan!</p>
    
    <button id="btnStart">🟢 NYALAKAN KAMERA & SISTEM ALARM</button>
    
    <div id="cctvArea" style="display: none;">
        <div class="status" id="statusInfo">Menyiapkan Kamera...</div><br>
        <!-- WAJIB Muted agar suara dari mic HP tidak feedback ke mic laptop sendiri -->
        <video id="videoKamera" autoplay muted playsinline></video>
    </div>
</div>

<script>
    const statusInfo = document.getElementById('statusInfo');
    const videoKamera = document.getElementById('videoKamera');
    const btnStart = document.getElementById('btnStart');
    const cctvArea = document.getElementById('cctvArea');

    let peer;
    let audioCtx;
    let oscillator;
    let gainNode;
    let sirenInterval;
    let isSirenPlaying = false;

    // TOMBOL WAJIB DIKLIK UNTUK MEMBUKA IZIN BROWSER
    btnStart.addEventListener('click', () => {
        btnStart.style.display = 'none';
        cctvArea.style.display = 'block';

        // 1. Buka Gembok AudioContext untuk Alarm
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();

        // 2. Mulai PeerJS
        peer = new Peer('cctv-laptop-rahasia-123');
        peer.on('open', (id) => {
            statusInfo.innerText = "⏳ Kamera Aktif. Menunggu HP Pemantau...";
            mulaiKamera();
        });
    });

    function mulaiKamera() {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then((stream) => {
                videoKamera.srcObject = stream;

                peer.on('call', (call) => {
                    statusInfo.innerText = "🟢 Pemantau Sedang Menonton";
                    call.answer(stream);
                    
                    // Menerima suara dari HP
                    call.on('stream', (suaraDariHP) => {
                        const audioRemote = new Audio();
                        audioRemote.srcObject = suaraDariHP;
                        audioRemote.play();
                    });
                });

                peer.on('connection', (conn) => {
                    conn.on('data', (data) => {
                        if (data === 'ALARM_ON') jalankanSiren();
                        else if (data === 'ALARM_OFF') matikanSiren();
                    });
                });
            })
            .catch((err) => {
                statusInfo.innerText = "🔴 Gagal! Izinkan akses kamera di browser.";
                console.error(err);
            });
    }

    function jalankanSiren() {
        if (isSirenPlaying) return;
        isSirenPlaying = true;
        statusInfo.innerText = "🚨 ALARM BERBUNYI!";
        statusInfo.classList.add('alarm-active');

        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'square'; // Suara lebih keras dan kasar
        
        let naik = true;
        sirenInterval = setInterval(() => {
            let freq = oscillator.frequency.value;
            freq = naik ? freq + 50 : freq - 50;
            if (freq >= 1200) naik = false;
            if (freq <= 600) naik = true;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        }, 30);

        gainNode.gain.value = 1;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
    }

    function matikanSiren() {
        if (!isSirenPlaying) return;
        isSirenPlaying = false;
        statusInfo.classList.remove('alarm-active');
        statusInfo.innerText = "🟢 Pemantau Sedang Menonton";

        clearInterval(sirenInterval);
        if (oscillator) {
            oscillator.stop();
            oscillator.disconnect();
        }
    }
</script>

</body>
</html>
