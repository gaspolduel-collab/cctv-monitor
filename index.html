<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor CCTV (HP)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; text-align: center; }
        video { background: #000; width: 100%; max-width: 500px; border-radius: 8px; border: 2px solid #333; margin-top: 10px; }
        .btn { padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 8px; box-sizing: border-box; }
        #btnConnect { background: #28a745; color: white; padding: 16px; font-size: 16px; }
        .kontrol { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-top: 15px; display: none; max-width: 500px; margin-left: auto; margin-right: auto; }
        .flex-btn { display: flex; gap: 8px; }
        #btnJepret { background: #007bff; color: white; width: 100%; }
        #btnAlarmOn { background: #dc3545; color: white; }
        #btnAlarmOff { background: #ffc107; color: #000; }
        #btnDVR { background: #17a2b8; color: white; margin-top: 15px; }
        #dvrArea { display: none; background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .badge { background: red; color: white; font-size: 10px; padding: 3px 6px; border-radius: 10px; vertical-align: top; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h2>📱 Monitor HP</h2>
    <p id="statusInfo">Klik tombol untuk menyambungkan</p>
    
    <button id="btnConnect" class="btn">🔌 Sambungkan ke Kamera</button>
    
    <div style="position: relative; max-width: 500px; margin: auto;">
        <span id="badgeLive" class="badge" style="position: absolute; top: 15px; right: 10px; display: none;">🔴 REC</span>
        <video id="videoMonitor" autoplay playsinline muted style="cursor: pointer;" onclick="this.play()"></video>
        <p id="teksBantu" style="display: none; color: #ffc107; font-size: 12px; margin-top: 5px; font-weight: bold;">
            ⚠️ Jika video macet/hitam, KETUK layar videonya!
        </p>
    </div>

    <div id="kontrolArea" class="kontrol">
        <button id="btnJepret" class="btn">📸 Jepret Foto</button>
        <div class="flex-btn">
            <button id="btnAlarmOn" class="btn">🚨 ALARM ON</button>
            <button id="btnAlarmOff" class="btn">🔕 ALARM OFF</button>
        </div>

        <hr style="border-color: #333; margin: 15px 0;">
        <button id="btnDVR" class="btn">⏪ Buka Timeline Kejadian Awal</button>
    </div>

    <div id="dvrArea" class="kontrol">
        <h4 style="margin: 0 0 10px 0; color: #17a2b8;">⏪ Geser Kiri untuk Replay</h4>
        <video id="videoReplay" controls playsinline></video>
    </div>

<script>
    const ID_TUJUAN = 'cctv-pribadi-final-999';

    const statusInfo = document.getElementById('statusInfo');
    const videoMonitor = document.getElementById('videoMonitor');
    const badgeLive = document.getElementById('badgeLive');
    const kontrolArea = document.getElementById('kontrolArea');
    const dvrArea = document.getElementById('dvrArea');
    const videoReplay = document.getElementById('videoReplay');
    const teksBantu = document.getElementById('teksBantu');
    
    const peer = new Peer({
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    }); 
    
    let dataKoneksi = null;   
    let mediaRecorder;
    let recordedChunks = [];

    document.getElementById('btnConnect').addEventListener('click', () => {
        statusInfo.innerText = "Mencari laptop...";

        // PERBAIKAN FATAL: Panggil kamera TANPA meminta izin mic dari pemantau.
        // Ini memastikan tidak ada bentrok hardware.
        const call = peer.call(ID_TUJUAN);
        
        call.on('stream', (streamKamera) => {
            console.log("Stream video berhasil ditarik!");
            videoMonitor.srcObject = streamKamera;
            teksBantu.style.display = 'block';

            videoMonitor.play().then(() => {
                teksBantu.style.display = 'none'; 
            }).catch(e => console.log("Butuh klik layar."));

            statusInfo.innerText = "🟢 TERHUBUNG DENGAN KAMERA";
            document.getElementById('btnConnect').style.display = 'none';
            kontrolArea.style.display = 'block';
            badgeLive.style.display = 'inline-block';

            mulaiPerekamanBackground(streamKamera);
        });

        // Jalur data tetap dibuka untuk tombol Alarm
        dataKoneksi = peer.connect(ID_TUJUAN);
    });

    document.getElementById('btnJepret').addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = videoMonitor.videoWidth;
        canvas.height = videoMonitor.videoHeight;
        canvas.getContext('2d').drawImage(videoMonitor, 0, 0, canvas.width, canvas.height);
        
        const a = document.createElement('a');
        a.download = `CCTV-Snap-${Date.now()}.jpg`;
        a.href = canvas.toDataURL('image/jpeg');
        a.click();
    });

    document.getElementById('btnAlarmOn').addEventListener('click', () => {
        if (dataKoneksi) dataKoneksi.send('ALARM_ON');
    });
    document.getElementById('btnAlarmOff').addEventListener('click', () => {
        if (dataKoneksi) dataKoneksi.send('ALARM_OFF');
    });

    function mulaiPerekamanBackground(stream) {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.start(1000); 
    }

    document.getElementById('btnDVR').addEventListener('click', () => {
        if (recordedChunks.length === 0) return alert("Belum ada data terekam.");
        dvrArea.style.display = 'block';
        const superBuffer = new Blob(recordedChunks, { type: 'video/webm' });
        videoReplay.src = URL.createObjectURL(superBuffer);
    });
</script>
</body>
</html>
